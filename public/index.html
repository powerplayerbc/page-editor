<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Page Builder | RDGR</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- GrapesJS -->
    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs"></script>
    <script src="https://unpkg.com/grapesjs-preset-webpage"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ed-base: #08090D;
            --ed-surface: #11131A;
            --ed-surface-el: #1A1D28;
            --ed-surface-hi: #242836;
            --ed-border: #2A2E3D;
            --ed-accent: #06D6A0;
            --ed-accent-dim: rgba(6,214,160,0.15);
            --ed-txt: #E8ECF1;
            --ed-txt-2: #8A95A9;
            --ed-txt-3: #525E73;
            --ed-danger: #FF6B6B;
            --ed-warn: #FFD93D;
            --ed-info: #4CC9F0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--ed-base);
            color: var(--ed-txt);
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .font-heading { font-family: 'Chakra Petch', system-ui, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* ── Layout ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Top Toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 48px;
            background: var(--ed-surface);
            border-bottom: 1px solid var(--ed-border);
            flex-shrink: 0;
            z-index: 100;
        }
        #toolbar .toolbar-left,
        #toolbar .toolbar-center,
        #toolbar .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #toolbar .toolbar-center { flex: 1; justify-content: center; }

        .tb-btn {
            font-family: 'Chakra Petch', system-ui;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid var(--ed-border);
            background: transparent;
            color: var(--ed-txt-2);
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .tb-btn:hover { background: rgba(255,255,255,0.04); color: var(--ed-txt); }
        .tb-btn.active { background: var(--ed-accent-dim); color: var(--ed-accent); border-color: rgba(6,214,160,0.3); }
        .tb-btn-primary {
            background: var(--ed-accent-dim);
            color: var(--ed-accent);
            border-color: rgba(6,214,160,0.3);
        }
        .tb-btn-primary:hover { background: rgba(6,214,160,0.25); }
        .tb-btn-warn {
            background: rgba(255,107,107,0.1);
            color: var(--ed-danger);
            border-color: rgba(255,107,107,0.25);
        }

        .tb-select {
            font-family: 'IBM Plex Sans', system-ui;
            font-size: 0.75rem;
            padding: 5px 8px;
            border-radius: 5px;
            border: 1px solid var(--ed-border);
            background: var(--ed-surface-el);
            color: var(--ed-txt);
            cursor: pointer;
            outline: none;
            max-width: 180px;
        }
        .tb-select option { background: var(--ed-surface-el); color: var(--ed-txt); }

        .tb-divider {
            width: 1px;
            height: 24px;
            background: var(--ed-border);
            margin: 0 4px;
        }

        .tb-label {
            font-size: 0.65rem;
            color: var(--ed-txt-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Production warning banner ── */
        #prodWarning {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(255,107,107,0.1);
            border-bottom: 1px solid rgba(255,107,107,0.2);
            font-size: 0.75rem;
            color: var(--ed-danger);
            flex-shrink: 0;
        }
        #prodWarning.show { display: flex; }

        /* ── Editor Container ── */
        #editorContainer {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        #toast.success { background: rgba(6,214,160,0.2); color: #06D6A0; border: 1px solid rgba(6,214,160,0.3); }
        #toast.error { background: rgba(255,107,107,0.2); color: #FF6B6B; border: 1px solid rgba(255,107,107,0.3); }
        #toast.info { background: rgba(76,201,240,0.2); color: #4CC9F0; border: 1px solid rgba(76,201,240,0.3); }

        /* ── Unsaved dot ── */
        .unsaved-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--ed-warn);
            display: none;
        }
        .unsaved-dot.show { display: block; }

        /* ══════════════════════════════════════
           GrapesJS Theme Overrides (Dark)
           ══════════════════════════════════════ */

        .gjs-one-bg { background-color: var(--ed-surface) !important; }
        .gjs-two-color { color: var(--ed-txt-2) !important; }
        .gjs-three-bg { background-color: var(--ed-surface-el) !important; }
        .gjs-four-color, .gjs-four-color-h:hover { color: var(--ed-accent) !important; }

        /* Panels */
        .gjs-pn-panels { background: var(--ed-surface) !important; }
        .gjs-pn-panel { background: var(--ed-surface) !important; }
        .gjs-pn-views-container,
        .gjs-pn-views { background: var(--ed-surface) !important; }

        /* Canvas frame */
        .gjs-cv-canvas { background: var(--ed-base) !important; }
        .gjs-frame-wrapper { background: var(--ed-base) !important; }

        /* Blocks */
        .gjs-blocks-cs { background: var(--ed-surface) !important; }
        .gjs-block {
            background: var(--ed-surface-el) !important;
            border: 1px solid var(--ed-border) !important;
            color: var(--ed-txt-2) !important;
            border-radius: 6px !important;
            min-height: 60px !important;
            transition: border-color 0.15s !important;
        }
        .gjs-block:hover {
            border-color: var(--ed-accent) !important;
            color: var(--ed-txt) !important;
        }
        .gjs-block__media { color: var(--ed-txt-3) !important; }

        /* Layers */
        .gjs-layers { background: var(--ed-surface) !important; }
        .gjs-layer { background: var(--ed-surface) !important; }
        .gjs-layer-name { color: var(--ed-txt-2) !important; }

        /* Traits */
        .gjs-trt-traits { background: var(--ed-surface) !important; }
        .gjs-trt-trait { border-bottom-color: var(--ed-border) !important; }
        .gjs-trt-trait .gjs-label { color: var(--ed-txt-2) !important; }
        .gjs-field { background: var(--ed-surface-el) !important; border-color: var(--ed-border) !important; color: var(--ed-txt) !important; }
        .gjs-field input,
        .gjs-field select,
        .gjs-field textarea { color: var(--ed-txt) !important; }

        /* Style Manager */
        .gjs-sm-sector { background: var(--ed-surface) !important; }
        .gjs-sm-sector .gjs-sm-sector-title { color: var(--ed-txt-2) !important; border-bottom-color: var(--ed-border) !important; }
        .gjs-sm-property { color: var(--ed-txt-2) !important; }
        .gjs-sm-label { color: var(--ed-txt-3) !important; }

        /* Selection highlight */
        .gjs-selected { outline: 2px solid var(--ed-accent) !important; outline-offset: -2px; }
        .gjs-highlighter { outline-color: var(--ed-accent) !important; }

        /* Toolbar on components */
        .gjs-toolbar { background: var(--ed-surface-el) !important; border: 1px solid var(--ed-border) !important; border-radius: 4px !important; }
        .gjs-toolbar-item { color: var(--ed-txt-2) !important; }
        .gjs-toolbar-item:hover { color: var(--ed-accent) !important; }

        /* Resizer */
        .gjs-resizer-h { border-color: var(--ed-accent) !important; }

        /* RTE toolbar */
        .gjs-rte-toolbar { background: var(--ed-surface-el) !important; border: 1px solid var(--ed-border) !important; border-radius: 6px !important; }
        .gjs-rte-actionbar .gjs-rte-action { color: var(--ed-txt-2) !important; }

        /* Hide default top panel (we use our own toolbar) */
        .gjs-pn-commands,
        .gjs-pn-options,
        .gjs-pn-devices-c { display: none !important; }

        /* Scrollbar inside GJS panels */
        .gjs-pn-views-container::-webkit-scrollbar,
        .gjs-blocks-cs::-webkit-scrollbar { width: 5px; }
        .gjs-pn-views-container::-webkit-scrollbar-thumb,
        .gjs-blocks-cs::-webkit-scrollbar-thumb { background: var(--ed-border); border-radius: 3px; }

        /* Category titles in block manager */
        .gjs-block-category .gjs-title {
            background: var(--ed-surface-hi) !important;
            color: var(--ed-txt-2) !important;
            border-bottom: 1px solid var(--ed-border) !important;
            font-family: 'Chakra Petch', system-ui !important;
            font-size: 0.7rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.06em !important;
        }

        /* Tailwind classes panel */
        #classesPanel {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: var(--ed-surface-el);
            border: 1px solid var(--ed-border);
            border-radius: 8px;
            padding: 8px 12px;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #classesPanel.show { display: flex; }
        #classesPanel label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--ed-txt-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        #classesInput {
            background: var(--ed-surface);
            border: 1px solid var(--ed-border);
            border-radius: 4px;
            padding: 5px 8px;
            color: var(--ed-txt);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            width: 400px;
            outline: none;
        }
        #classesInput:focus { border-color: var(--ed-accent); }
    </style>
</head>
<body>
    <div id="app">
        <!-- ── Toolbar ── -->
        <div id="toolbar">
            <div class="toolbar-left">
                <a href="/rdgr" style="text-decoration:none; display:flex; align-items:center; gap:6px;">
                    <div style="width:7px;height:7px;border-radius:50%;background:var(--ed-accent);opacity:0.7;"></div>
                    <span class="font-heading" style="font-weight:700;font-size:0.8rem;color:var(--ed-txt);letter-spacing:0.04em;">RDGR</span>
                </a>
                <div class="tb-divider"></div>
                <span class="tb-label">Site</span>
                <select id="siteSelect" class="tb-select" onchange="loadPages()">
                    <option value="">Loading...</option>
                </select>
                <span class="tb-label">Page</span>
                <select id="pageSelect" class="tb-select" onchange="loadPage()">
                    <option value="">Select page...</option>
                </select>
                <div class="unsaved-dot" id="unsavedDot" title="Unsaved changes"></div>
            </div>

            <div class="toolbar-center">
                <button class="tb-btn active" id="btnDesktop" onclick="setDevice('Desktop')" title="Desktop view">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 12h6M7 10v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                </button>
                <button class="tb-btn" id="btnTablet" onclick="setDevice('Tablet')" title="Tablet view">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="11" r="0.5" fill="currentColor"/></svg>
                </button>
                <button class="tb-btn" id="btnMobile" onclick="setDevice('Mobile')" title="Mobile view">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="1" width="8" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="11" r="0.5" fill="currentColor"/></svg>
                </button>
                <div class="tb-divider"></div>
                <button class="tb-btn" onclick="editor.runCommand('core:undo')" title="Undo (Ctrl+Z)">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h7a3 3 0 010 6H8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5 4L2 7l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="tb-btn" onclick="editor.runCommand('core:redo')" title="Redo (Ctrl+Shift+Z)">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 7H4a3 3 0 000 6h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M9 4l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="tb-divider"></div>
                <button class="tb-btn" id="btnPreview" onclick="togglePreview()" title="Toggle preview mode">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7s2.5-4 6-4 6 4 6 4-2.5 4-6 4-6-4-6-4z" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
                    Preview
                </button>
            </div>

            <div class="toolbar-right">
                <button class="tb-btn" onclick="togglePanel('blocks')" id="btnBlocks" title="Toggle blocks panel">Blocks</button>
                <button class="tb-btn" onclick="togglePanel('styles')" id="btnStyles" title="Toggle styles panel">Styles</button>
                <button class="tb-btn" onclick="togglePanel('layers')" id="btnLayers" title="Toggle layers panel">Layers</button>
                <div class="tb-divider"></div>
                <button class="tb-btn" onclick="viewCode()" title="View HTML source">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4.5 4L1.5 7l3 3M9.5 4l3 3-3 3M8 2l-2 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="tb-btn tb-btn-primary" onclick="savePage()" id="btnSave" title="Save (Ctrl+S)">Save</button>
            </div>
        </div>

        <!-- ── Production warning ── -->
        <div id="prodWarning">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L1 13h12L7 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M7 5v3M7 10v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span><strong>Production page</strong> — changes here will affect the live site when deployed. Edit with care.</span>
        </div>

        <!-- ── Editor ── -->
        <div id="editorContainer">
            <div id="gjs"></div>
        </div>
    </div>

    <!-- ── Tailwind Classes Panel ── -->
    <div id="classesPanel">
        <label>Classes</label>
        <input type="text" id="classesInput" placeholder="e.g. text-xl font-bold text-accent mb-4" spellcheck="false">
        <button class="tb-btn" onclick="applyClasses()" style="font-size:0.65rem;padding:4px 8px;">Apply</button>
    </div>

    <!-- ── Toast ── -->
    <div id="toast"></div>

    <!-- ── Code Viewer Modal ── -->
    <div id="codeModal" style="display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
        <div style="background:var(--ed-surface); border:1px solid var(--ed-border); border-radius:12px; width:90vw; max-width:900px; max-height:80vh; display:flex; flex-direction:column; overflow:hidden;">
            <div style="padding:12px 16px; border-bottom:1px solid var(--ed-border); display:flex; align-items:center; justify-content:space-between;">
                <span class="font-heading" style="font-weight:600; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.04em;">HTML Source</span>
                <div style="display:flex; gap:8px;">
                    <button class="tb-btn" onclick="copyCode()">Copy</button>
                    <button class="tb-btn" onclick="closeCode()">Close</button>
                </div>
            </div>
            <textarea id="codeView" readonly spellcheck="false" style="flex:1; background:var(--ed-base); color:var(--ed-txt-2); border:none; padding:16px; font-family:'JetBrains Mono',monospace; font-size:0.75rem; line-height:1.6; resize:none; outline:none; overflow:auto;"></textarea>
        </div>
    </div>

    <script>
    /* ══════════════════════════════════════════════
       PAGE BUILDER — Core Logic
       ══════════════════════════════════════════════ */

    const API_BASE = window.location.origin;
    let editor;
    let currentSite = '';
    let currentPage = '';
    let storedHead = '';
    let storedScripts = [];
    let hasUnsaved = false;
    let isPreviewMode = false;

    // Production sites that show a warning
    const PRODUCTION_SITES = ['bradfordcarlton'];
    const SANDBOX_PAGE = 'builder-test.html';

    /* ── HTML Parser: Split & Reassemble ── */

    function parseHTML(html) {
        // Extract <head> content
        const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
        const headContent = headMatch ? headMatch[1] : '';

        // Extract <body> content
        const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        let bodyContent = bodyMatch ? bodyMatch[1] : html;

        // Extract and store <script> tags from body
        const scripts = [];
        let scriptIndex = 0;
        bodyContent = bodyContent.replace(
            /<script[\s\S]*?<\/script>/gi,
            (match) => {
                scripts.push({ index: scriptIndex, content: match });
                scriptIndex++;
                return `<!-- __SCRIPT_PLACEHOLDER_${scriptIndex - 1}__ -->`;
            }
        );

        return { headContent, bodyContent, scripts };
    }

    function reassembleHTML(headContent, bodyHtml, scripts) {
        // Restore scripts into body
        let body = bodyHtml;
        scripts.forEach((s) => {
            body = body.replace(
                `<!-- __SCRIPT_PLACEHOLDER_${s.index}__ -->`,
                s.content
            );
        });

        // Also remove any leftover placeholders (if editor removed elements)
        body = body.replace(/<!-- __SCRIPT_PLACEHOLDER_\d+__ -->/g, '');

        return `<!DOCTYPE html>\n<html lang="en">\n<head>${headContent}</head>\n<body>\n${body}\n</body>\n</html>`;
    }

    /* ── Initialize GrapesJS ── */

    function initEditor() {
        editor = grapesjs.init({
            container: '#gjs',
            fromElement: false,
            height: '100%',
            width: 'auto',
            storageManager: false,

            canvas: {
                styles: [],
                scripts: [],
            },

            deviceManager: {
                devices: [
                    { name: 'Desktop', width: '' },
                    { name: 'Tablet', width: '768px', widthMedia: '992px' },
                    { name: 'Mobile', width: '375px', widthMedia: '768px' },
                ],
            },

            panels: { defaults: [] },

            blockManager: {
                appendTo: '.gjs-pn-views-container',
            },

            styleManager: {
                appendTo: '.gjs-pn-views-container',
            },

            layerManager: {
                appendTo: '.gjs-pn-views-container',
            },

            plugins: ['gjs-preset-webpage'],
            pluginsOpts: {
                'gjs-preset-webpage': {
                    blocksBasicOpts: { flexGrid: true },
                    navbarOpts: false,
                    countdownOpts: false,
                    formsOpts: false,
                },
            },

            assetManager: {
                assets: [],
                uploadFile: false,
                autoAdd: true,
            },
        });

        // Register custom blocks
        registerCustomBlocks();

        // Track changes
        editor.on('change:changesCount', () => {
            if (!hasUnsaved) {
                hasUnsaved = true;
                document.getElementById('unsavedDot').classList.add('show');
            }
        });

        // Show classes panel on component select
        editor.on('component:selected', (component) => {
            const classes = component.getEl()?.className || '';
            document.getElementById('classesInput').value = typeof classes === 'string' ? classes : '';
            document.getElementById('classesPanel').classList.add('show');
        });

        editor.on('component:deselected', () => {
            document.getElementById('classesPanel').classList.remove('show');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                savePage();
            }
        });

        // Add default panels config for views
        editor.Panels.addPanel({
            id: 'views',
            el: '.gjs-pn-views-container',
            buttons: [],
        });
    }

    /* ── Custom Blocks ── */

    function registerCustomBlocks() {
        const bm = editor.BlockManager;

        // -- Layout blocks --
        bm.add('section-hero', {
            label: 'Hero Section',
            category: 'Sections',
            content: `<section class="relative min-h-[60vh] flex items-center justify-center overflow-hidden py-20" style="background: linear-gradient(135deg, #08090D 0%, #11131A 50%, #0D1117 100%);">
                <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
                    <h1 class="font-heading text-4xl sm:text-5xl font-bold tracking-tight mb-6">Your Headline Here</h1>
                    <p class="text-lg max-w-2xl mx-auto mb-8" style="color:#8A95A9;">Subheading text that supports your main message and encourages action.</p>
                    <a href="#" class="inline-block px-8 py-3 rounded-lg font-semibold text-sm uppercase tracking-wide" style="background:rgba(6,214,160,0.15);color:#06D6A0;border:1px solid rgba(6,214,160,0.3);">Call to Action</a>

    /* ── API Calls ── */

    async function fetchJSON(url) {
        const resp = await fetch(API_BASE + url);
        if (!resp.ok) throw new Error(`API error: ${resp.status}`);
        return resp.json();
    }

    async function loadSites() {
        try {
            const sites = await fetchJSON('/api/sites');
            const sel = document.getElementById('siteSelect');
            sel.innerHTML = '<option value="">Choose site...</option>';
            sites.forEach((s) => {
                const opt = document.createElement('option');
                opt.value = s.name;
                opt.textContent = `${s.name} (${s.pages} pages)`;
                sel.appendChild(opt);
            });
            // Default to sandbox
            const sandbox = sites.find((s) => s.name === 'sandbox');
            if (sandbox) {
                sel.value = 'sandbox';
                await loadPages();
            }
        } catch (err) {
            showToast('Failed to load sites: ' + err.message, 'error');
        }
    }

    async function loadPages() {
        const site = document.getElementById('siteSelect').value;
        const sel = document.getElementById('pageSelect');
        sel.innerHTML = '<option value="">Loading...</option>';

        if (!site) {
            sel.innerHTML = '<option value="">Select a site first</option>';
            return;
        }

        // Show/hide production warning
        const warn = document.getElementById('prodWarning');
        warn.classList.toggle('show', PRODUCTION_SITES.includes(site));

        try {
            const pages = await fetchJSON(`/api/sites/${site}/pages`);
            sel.innerHTML = '<option value="">Choose page...</option>';
            pages.forEach((p) => {
                const opt = document.createElement('option');
                opt.value = p.name;
                const kb = (p.size / 1024).toFixed(0);
                opt.textContent = `${p.name} (${kb}KB)`;
                sel.appendChild(opt);
            });
            currentSite = site;

            // Auto-select builder-test.html if available
            if (site === 'sandbox' && pages.find((p) => p.name === SANDBOX_PAGE)) {
                sel.value = SANDBOX_PAGE;
                loadPage();
            }
        } catch (err) {
            showToast('Failed to load pages: ' + err.message, 'error');
        }
    }

    async function loadPage() {
        const site = document.getElementById('siteSelect').value;
        const page = document.getElementById('pageSelect').value;
        if (!site || !page) return;

        try {
            showToast('Loading page...', 'info');
            const data = await fetchJSON(`/api/sites/${site}/pages/${page}`);
            const { headContent, bodyContent, scripts } = parseHTML(data.content);

            storedHead = headContent;
            storedScripts = scripts;
            currentPage = page;

            // Load body into GrapesJS
            editor.setComponents(bodyContent);
            editor.setStyle(''); // Clear styles — Tailwind handles everything

            // Inject Tailwind + styles into canvas iframe
            injectCanvasResources(headContent);

            // Load assets
            loadAssets(site);

            // Reset unsaved state
            hasUnsaved = false;
            document.getElementById('unsavedDot').classList.remove('show');

            showToast(`Loaded ${page}`, 'success');
        } catch (err) {
            showToast('Failed to load page: ' + err.message, 'error');
        }
    }

    function injectCanvasResources(headContent) {
        const frame = editor.Canvas.getFrameEl();
        if (!frame) return;

        const doc = frame.contentDocument;
        const head = doc.head;

        // Clear previous injections
        head.querySelectorAll('[data-editor-injected]').forEach((el) => el.remove());

        // Extract and inject stylesheets from the original head
        const linkMatches = headContent.matchAll(/<link[^>]*href=["']([^"']+)["'][^>]*>/gi);
        for (const m of linkMatches) {
            const link = doc.createElement('link');
            link.rel = 'stylesheet';
            link.href = m[1];
            link.setAttribute('data-editor-injected', 'true');
            head.appendChild(link);
        }

        // Extract and inject <style> blocks
        const styleMatches = headContent.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi);
        for (const m of styleMatches) {
            const style = doc.createElement('style');
            style.textContent = m[1];
            style.setAttribute('data-editor-injected', 'true');
            head.appendChild(style);
        }

        // Inject Tailwind CDN
        const twScript = doc.createElement('script');
        twScript.src = 'https://cdn.tailwindcss.com';
        twScript.setAttribute('data-editor-injected', 'true');
        head.appendChild(twScript);

        // Extract and inject tailwind.config script
        const configMatch = headContent.match(/<script>\s*tailwind\.config\s*=\s*\{[\s\S]*?\}\s*<\/script>/i);
        if (configMatch) {
            const configScript = doc.createElement('script');
            configScript.textContent = configMatch[0].replace(/<\/?script>/gi, '');
            configScript.setAttribute('data-editor-injected', 'true');
            // Wait for Tailwind to load before applying config
            twScript.onload = () => head.appendChild(configScript);
        }

        // Inject Google Fonts
        const fontMatches = headContent.matchAll(/<link[^>]*fonts\.googleapis\.com[^>]*>/gi);
        for (const m of fontMatches) {
            const temp = doc.createElement('div');
            temp.innerHTML = m[0];
            const link = temp.firstChild;
            if (link) {
                link.setAttribute('data-editor-injected', 'true');
                head.appendChild(link);
            }
        }
    }

    async function loadAssets(site) {
        try {
            const assets = await fetchJSON(`/api/sites/${site}/assets`);
            const assetList = assets.map((a) => ({
                src: `${API_BASE}/sites/${site}/${a.path}`,
                name: a.name,
                type: 'image',
            }));
            editor.AssetManager.add(assetList);
        } catch (err) {
            console.warn('Could not load assets:', err);
        }
    }

    /* ── Save ── */

    async function savePage() {
        if (!currentSite || !currentPage) {
            return showToast('No page loaded to save', 'error');
        }

        const btn = document.getElementById('btnSave');
        btn.textContent = 'Saving...';
        btn.disabled = true;

        try {
            const bodyHtml = editor.getHtml();
            const fullHtml = reassembleHTML(storedHead, bodyHtml, storedScripts);

            const resp = await fetch(`${API_BASE}/api/sites/${currentSite}/pages/${currentPage}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: fullHtml }),
            });

            if (!resp.ok) throw new Error('Save failed');

            hasUnsaved = false;
            document.getElementById('unsavedDot').classList.remove('show');
            showToast(`Saved ${currentPage}`, 'success');
        } catch (err) {
            showToast('Save failed: ' + err.message, 'error');
        } finally {
            btn.textContent = 'Save';
            btn.disabled = false;
        }
    }

    /* ── Device Switching ── */

    function setDevice(device) {
        editor.setDevice(device);
        document.querySelectorAll('#btnDesktop, #btnTablet, #btnMobile').forEach((b) => b.classList.remove('active'));
        document.getElementById('btn' + device).classList.add('active');
    }

    /* ── Preview ── */

    function togglePreview() {
        if (isPreviewMode) {
            editor.stopCommand('preview');
            document.getElementById('btnPreview').classList.remove('active');
        } else {
            editor.runCommand('preview');
            document.getElementById('btnPreview').classList.add('active');
        }
        isPreviewMode = !isPreviewMode;
    }

    /* ── Panel Toggling ── */

    function togglePanel(panel) {
        const viewsContainer = document.querySelector('.gjs-pn-views-container');
        if (!viewsContainer) return;

        const panelMap = {
            blocks: 'open-blocks',
            styles: 'open-sm',
            layers: 'open-layers',
        };

        const cmd = panelMap[panel];
        if (!cmd) return;

        // Toggle the panel
        if (editor.Commands.isActive(cmd)) {
            editor.stopCommand(cmd);
        } else {
            // Close others first
            Object.values(panelMap).forEach((c) => {
                if (c !== cmd && editor.Commands.isActive(c)) editor.stopCommand(c);
            });
            editor.runCommand(cmd);
        }

        // Update button states
        ['blocks', 'styles', 'layers'].forEach((p) => {
            const btn = document.getElementById('btn' + p.charAt(0).toUpperCase() + p.slice(1));
            const isActive = editor.Commands.isActive(panelMap[p]);
            btn.classList.toggle('active', isActive);
        });
    }

    /* ── Classes Editor ── */

    function applyClasses() {
        const selected = editor.getSelected();
        if (!selected) return;

        const input = document.getElementById('classesInput');
        const newClasses = input.value.trim();

        // Set the class attribute directly
        selected.setAttributes({ ...selected.getAttributes(), class: newClasses });
        showToast('Classes applied', 'success');
    }

    /* ── Code Viewer ── */

    function viewCode() {
        const bodyHtml = editor.getHtml();
        const fullHtml = reassembleHTML(storedHead, bodyHtml, storedScripts);

        // Basic formatting
        const formatted = fullHtml
            .replace(/></g, '>\n<')
            .replace(/\n\s*\n/g, '\n');

        document.getElementById('codeView').value = formatted;
        document.getElementById('codeModal').style.display = 'flex';
    }

    function closeCode() {
        document.getElementById('codeModal').style.display = 'none';
    }

    function copyCode() {
        const textarea = document.getElementById('codeView');
        navigator.clipboard.writeText(textarea.value);
        showToast('HTML copied to clipboard', 'success');
    }

    /* ── Toast ── */

    let toastTimeout;
    function showToast(msg, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `show ${type}`;
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.className = '';
        }, 3000);
    }

    /* ── Boot ── */

    document.addEventListener('DOMContentLoaded', () => {
        initEditor();
        loadSites();

        // Open blocks panel by default
        setTimeout(() => {
            editor.runCommand('open-blocks');
            document.getElementById('btnBlocks').classList.add('active');
        }, 500);
    });
    </script>
</body>
</html>
